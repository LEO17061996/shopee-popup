<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Đang chuyển đến App Shopee...</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
       background:linear-gradient(135deg,#ee4d2d,#ff7337);
       min-height:100vh;color:#fff;display:flex;align-items:center;
       justify-content:center;padding:20px;text-align:center}
  .wrap{max-width:360px;width:100%}
  .logo{width:90px;height:90px;border-radius:22px;background:#fff;color:#ee4d2d;
        font-size:48px;font-weight:800;line-height:90px;margin:0 auto 20px;
        box-shadow:0 8px 24px rgba(0,0,0,.2)}
  h1{font-size:22px;font-weight:700;margin-bottom:8px}
  .sub{font-size:14.5px;opacity:.95;margin-bottom:24px;line-height:1.5}
  .spinner{width:46px;height:46px;border:4px solid rgba(255,255,255,.3);
           border-top-color:#fff;border-radius:50%;margin:0 auto 24px;
           animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn{display:block;width:100%;padding:14px;margin-top:10px;border:0;border-radius:12px;
       font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;color:#ee4d2d;
       background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.15)}
  .btn:active{transform:scale(.98)}
  .btn.ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5);
             box-shadow:none;font-size:13.5px}
  .fallback{display:none;margin-top:20px}
  .fallback.show{display:block}
  .ios-tip{display:none;background:rgba(0,0,0,.18);border-radius:12px;padding:14px;
           margin-top:16px;font-size:13px;line-height:1.55;text-align:left}
  .ios-tip.show{display:block}
  .ios-tip b{color:#fff8e1}
  .foot{font-size:11.5px;opacity:.7;margin-top:24px}
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">S</div>
  <h1>Đang mở App Shopee...</h1>
  <p class="sub">JYooHome Official Store<br/>Shopee Mall · ⭐ 4.7 (691.7k đánh giá)</p>

  <div class="spinner" id="spinner"></div>

  <div class="fallback" id="fallback">
    <button class="btn" id="btn-retry">🛒 BẤM ĐỂ MỞ APP SHOPEE</button>
    <a class="btn ghost" id="btn-web" href="#" target="_blank">Hoặc xem trên web Shopee</a>
  </div>

  <div class="ios-tip" id="ios-tip">
    📱 <b>Đang dùng iPhone trong app Facebook?</b><br/>
    Bấm dấu <b>⋯</b> ở góc dưới phải → chọn <b>Mở trong Safari</b> để vào thẳng App Shopee.
  </div>

  <div class="foot">Demo by LEO</div>
</div>

<script>
(function () {
  // ====== CẤU HÌNH ======
  const SHOPEE_PATH    = "jyoohome.official";
  const SHOPEE_WEB_URL = "https://shopee.vn/" + SHOPEE_PATH;
  const SHOPEE_SCHEME  = "shopee://shopee.vn/" + SHOPEE_PATH;
  const SHOPEE_PKG_AND = "com.shopee.vn";
  const PLAYSTORE_AND  = "https://play.google.com/store/apps/details?id=" + SHOPEE_PKG_AND;

  const ua = navigator.userAgent || "";
  const isAndroid = /Android/i.test(ua);
  const isIOS     = /iPhone|iPad|iPod/i.test(ua);
  const isFB      = /FBAN|FBAV|FB_IAB|FB4A|FBIOS/i.test(ua);

  document.getElementById("btn-web").href = SHOPEE_WEB_URL;

  // ====== HÀM MỞ APP ======
  function launchShopee() {
    if (isAndroid) {
      const intentUrl =
        "intent://shopee.vn/" + SHOPEE_PATH +
        "#Intent" +
        ";scheme=https" +
        ";package=" + SHOPEE_PKG_AND +
        ";S.browser_fallback_url=" + encodeURIComponent(PLAYSTORE_AND) +
        ";end";
      window.location.href = intentUrl;
      return;
    }

    if (isIOS) {
      // Universal Link – nếu app cài, iOS bật prompt "Mở trong Shopee"
      window.location.href = SHOPEE_WEB_URL;
      return;
    }

    // Desktop / khác
    window.location.href = SHOPEE_WEB_URL;
  }

  // ====== AUTO-LAUNCH KHI VÀO TRANG ======
  // Một số trình duyệt cần có 1 chút delay sau khi DOM render
  setTimeout(launchShopee, 250);

  // ====== FALLBACK: nếu sau 1.8s vẫn ở trang -> hiện nút bấm tay ======
  const startedAt = Date.now();
  setTimeout(function () {
    if (Date.now() - startedAt < 2800 && !document.hidden) {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("fallback").classList.add("show");
      if (isIOS && isFB) {
        document.getElementById("ios-tip").classList.add("show");
      }
    }
  }, 1800);

  // ====== NÚT BẤM TAY (fallback) ======
  document.getElementById("btn-retry").addEventListener("click", launchShopee);

  // ====== Khi user quay lại trang (vd. vừa thoát App Store) -> reset spinner ======
  document.addEventListener("visibilitychange", function () {
    if (document.hidden) {
      document.getElementById("spinner").style.display = "block";
      document.getElementById("fallback").classList.remove("show");
      document.getElementById("ios-tip").classList.remove("show");
    }
  });
})();
</script>

</body>
</html>
